name: Release

# Build-then-commit: a merged PR computes the next version, builds + tests every
# platform with that version (no publish), and only if ALL builds pass does
# `finalize` commit the version bump, tag, and publish the release. A failed
# build never bumps main or creates a tag. Add the `no-release` label to a PR to
# merge without triggering a build/release at all (CI-only, docs, etc.).
#
# Packaging is Tauri (tauri-apps/tauri-action). Bundles land under
# src-tauri/target/release/bundle/. Tauri reads the version from
# src-tauri/tauri.conf.json + src-tauri/Cargo.toml, so the version is written
# into all three (package.json, conf, Cargo) before building.

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

# Never run two releases at once — they race on the version bump + tag.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  compute-version:
    # Run on manual dispatch, or on a merged PR that is NOT labeled `no-release`.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       !contains(github.event.pull_request.labels.*.name, 'no-release'))
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Identify bump type
        id: bump-type
        # Label names are untrusted input — pass via env so they're data, not code.
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TYPE: ${{ github.event.inputs.bump_type }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "type=$DISPATCH_TYPE" >> "$GITHUB_OUTPUT"
          elif [[ ",$LABELS," == *",major,"* ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ ",$LABELS," == *",minor,"* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: compute
        env:
          BUMP_TYPE: ${{ steps.bump-type.outputs.type }}
          PRERELEASE_TAG: ${{ vars.PRERELEASE_TAG }}
        run: |
          # Strip any prerelease suffix before bumping so e.g. 0.0.5-alpha + patch = 0.0.6.
          CURRENT=$(jq -r .version package.json)
          BASE=$(echo "$CURRENT" | sed 's/-.*//')
          if [ "$CURRENT" != "$BASE" ]; then
            npm pkg set version="$BASE"
          fi
          # Compute only — do not tag or commit here.
          npm version "$BUMP_TYPE" --no-git-tag-version >/dev/null
          if [ -n "$PRERELEASE_TAG" ]; then
            NEXT=$(jq -r .version package.json)
            npm pkg set version="${NEXT}-${PRERELEASE_TAG}"
          fi
          VERSION=$(jq -r .version package.json)
          echo "Next version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: compute-version
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: release-mac
            rust-targets: "aarch64-apple-darwin x86_64-apple-darwin"
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            artifact: release-win
            rust-targets: ""
            args: ""
          - platform: ubuntu-24.04
            artifact: release-linux-x64
            rust-targets: ""
            args: ""
          - platform: ubuntu-24.04-arm
            artifact: release-linux-arm64
            rust-targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file \
            wget

      - name: Install dependencies
        run: npm install

      - name: Set release version
        # Tauri reads the version from tauri.conf.json + Cargo.toml (not package.json),
        # so write it into all three before building.
        shell: bash
        env:
          V: ${{ needs.compute-version.outputs.version }}
        run: |
          npm pkg set version="$V"
          node -e "const fs=require('fs');const v=process.env.V;const f='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(f));c.version=v;fs.writeFileSync(f,JSON.stringify(c,null,2)+'\n');let t=fs.readFileSync('src-tauri/Cargo.toml','utf8');t=t.replace(/^version = \".*\"/m,'version = \"'+v+'\"');fs.writeFileSync('src-tauri/Cargo.toml',t);"

      - name: Run tests
        run: npm test

      - name: Build (Tauri bundle, no publish)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing + notarization. Reuses the existing electron-builder
          # secrets — CSC_LINK is already the base64 of the Developer-ID .p12
          # (identical to what tauri-action wants for APPLE_CERTIFICATE), and
          # CSC_KEY_PASSWORD is its password — so no cert re-export is needed.
          # APPLE_SIGNING_IDENTITY ("Developer ID Application: … (TEAMID)") is the
          # only value electron-builder auto-discovered that tauri needs spelled
          # out. Build is unsigned/ad-hoc if these are absent.
          APPLE_CERTIFICATE: ${{ secrets.CSC_LINK }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/rpm/*.rpm

  finalize:
    # Only reached if every build job succeeded. This is the single point that
    # mutates main: commit the bump, tag, and publish — so a failed build leaves
    # main untouched (no bump, no tag, no release).
    needs:
      - compute-version
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Commit version bump and tag
        # Bump all three version sources so a follow-up build is reproducible.
        env:
          V: ${{ needs.compute-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm pkg set version="$V"
          node -e "const fs=require('fs');const v=process.env.V;const f='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(f));c.version=v;fs.writeFileSync(f,JSON.stringify(c,null,2)+'\n');let t=fs.readFileSync('src-tauri/Cargo.toml','utf8');t=t.replace(/^version = \".*\"/m,'version = \"'+v+'\"');fs.writeFileSync('src-tauri/Cargo.toml',t);"
          git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock 2>/dev/null || git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore(release): bump version to $V"
          # Clear any stale tag from a prior failed run.
          git push origin ":refs/tags/v$V" 2>/dev/null || true
          git tag -d "v$V" 2>/dev/null || true
          git tag -a "v$V" -m "v$V"
          git push origin main
          git push origin "refs/tags/v$V"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Write release notes
        # PR body is untrusted (free-form, fork-controllable). Pass via env so the
        # shell treats it as data, never as code — no heredoc/command injection.
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          VERSION: ${{ needs.compute-version.outputs.version }}
        run: |
          if [ -n "$PR_BODY" ]; then
            printf '%s\n' "$PR_BODY" > release_notes.md
          else
            echo "Release v$VERSION" > release_notes.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          gh release create "v$VERSION" \
            --repo Canonical-AI/canonic \
            --title "v$VERSION" \
            --notes-file release_notes.md \
            --target main \
            $(find release-artifacts -type f)

  update-brew:
    needs: [compute-version, finalize]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Update Homebrew Cask
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: canonic
          formula-path: Casks/canonic.rb
          homebrew-tap: Canonical-AI/homebrew-tap
          # This workflow runs on a PR-merge (not a tag push), so the action
          # can't infer the tag from the ref — pass it explicitly.
          tag-name: v${{ needs.compute-version.outputs.version }}
          # Tauri dmg name is canonic_<version>_aarch64.dmg (was canonic-arm64.dmg under electron-builder).
          download-url: https://github.com/Canonical-AI/canonic/releases/download/v${{ needs.compute-version.outputs.version }}/canonic_${{ needs.compute-version.outputs.version }}_aarch64.dmg
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
