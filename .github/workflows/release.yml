name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  create-draft:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get version
        id: get-version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create or Verify draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get-version.outputs.version }}
          if ! gh release view "v$VERSION" > /dev/null 2>&1; then
            echo "Creating new draft release (manual tag push?)..."
            gh release create "v$VERSION" --draft --title "v$VERSION" --notes "Release v$VERSION"
          else
            echo "Release v$VERSION already exists (created by version-bump workflow)."
          fi

  release-mac:
    needs: create-draft
    permissions:
      contents: write
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build and Publish (mac)
        run: npm run build:mac -- --publish always
        env:
          DEBUG: "electron-builder"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' }}

  release-win:
    needs: create-draft
    permissions:
      contents: write
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build and Publish (win)
        run: npm run build:win -- --publish always
        env:
          DEBUG: "electron-builder"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux-x64:
    needs: create-draft
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Cache Flatpak runtimes
        uses: actions/cache@v4
        id: cache-flatpak-x64
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtimes-x64-24.08

      - name: Install Flatpak toolchain and runtimes (x64)
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils libarchive-tools
          if [ "${{ steps.cache-flatpak-x64.outputs.cache-hit }}" != "true" ]; then
            flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
            flatpak install --user -y --noninteractive flathub \
              org.freedesktop.Platform//24.08 \
              org.freedesktop.Sdk//24.08 \
              org.electronjs.Electron2.BaseApp//24.08
          fi

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build and Publish (linux x64)
        run: npm run build:linux -- --x64 --publish always
        env:
          DEBUG: "electron-builder"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-linux-arm64:
    needs: create-draft
    permissions:
      contents: write
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Cache Flatpak runtimes
        uses: actions/cache@v4
        id: cache-flatpak-arm64
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtimes-arm64-24.08

      - name: Install Flatpak toolchain and runtimes (arm64)
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils libarchive-tools
          if [ "${{ steps.cache-flatpak-arm64.outputs.cache-hit }}" != "true" ]; then
            flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
            flatpak install --user -y --noninteractive flathub \
              org.freedesktop.Platform//24.08 \
              org.freedesktop.Sdk//24.08 \
              org.electronjs.Electron2.BaseApp//24.08
          fi

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build and Publish (linux arm64)
        run: npm run build:linux -- --arm64 --publish always
        env:
          DEBUG: "electron-builder"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-release:
    needs: [create-draft, release-mac, release-win, release-linux-x64, release-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "v${{ needs.create-draft.outputs.version }}" \
            --repo Canonical-AI/canonic \
            --draft=false

  update-brew:
    needs: [create-draft, release-mac, publish-release]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Update Homebrew Cask
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: canonic
          formula-path: Casks/canonic.rb
          homebrew-tap: Canonical-AI/homebrew-tap
          download-url: https://github.com/Canonical-AI/canonic/releases/download/v${{ needs.create-draft.outputs.version }}/canonic-arm64.dmg
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
