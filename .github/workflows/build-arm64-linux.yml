name: Build arm64 Linux bundle

# Builds aarch64 Linux bundles (.deb + .AppImage) for arm64 Linux devices via
# Tauri. Runs on a native arm64 runner. Trigger manually from the Actions tab.
#
# NOTE: this is NOT the Flatpak build (it was historically misnamed
# build-flatpak.yml). The Flatpak bundle is produced by the `build-flatpak` job
# in release.yml from flatpak/ai.canonic.app.yml. The AppImage here targets
# glibc arm64 distros; it does NOT run on musl distros like Alpine — use the
# Flatpak there.

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file \
            wget

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build arm64 Tauri bundle
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: canonic-arm64-linux
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
