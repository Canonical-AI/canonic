name: Version Bump

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Verify Token
        run: |
          if [ -z "${{ secrets.RELEASE_TOKEN }}" ]; then
            echo "::warning::RELEASE_TOKEN is empty, falling back to GITHUB_TOKEN"
          else
            echo "RELEASE_TOKEN is present"
          fi

      - name: Identify bump type
        id: bump-type
        run: |
          LABELS='${{ join(github.event.pull_request.labels.*.name, ',') }}'
          if [[ ",$LABELS," == *",major,"* ]]; then
            echo "type=major" >> $GITHUB_OUTPUT
          elif [[ ",$LABELS," == *",minor,"* ]]; then
            echo "type=minor" >> $GITHUB_OUTPUT
          else
            echo "type=patch" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        env:
          BUMP_TYPE: ${{ steps.bump-type.outputs.type }}
          PRERELEASE_TAG: ${{ vars.PRERELEASE_TAG }}
        run: |
          echo "Bumping version with type: $BUMP_TYPE"
          # Strip prerelease suffix before bumping so e.g. 0.0.5-alpha + patch = 0.0.6 not 0.0.5
          CURRENT=$(jq -r .version package.json)
          BASE=$(echo "$CURRENT" | sed 's/-.*//')
          if [ "$CURRENT" != "$BASE" ]; then
            npm pkg set version="$BASE"
          fi
          npm version "$BUMP_TYPE" --no-git-tag-version

          if [ -n "$PRERELEASE_TAG" ]; then
            CURRENT=$(jq -r .version package.json)
            npm pkg set version="${CURRENT}-${PRERELEASE_TAG}"
          fi

          VERSION=$(jq -r .version package.json)
          git add package.json package-lock.json
          git commit -m "chore(release): bump version to $VERSION"
          git tag "v$VERSION"

      - name: Push changes
        run: git push origin main --follow-tags

      - name: Create Draft Release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(jq -r .version package.json)
          # Save PR body to a file to handle markdown and special characters safely
          cat << 'EOF' > release_notes.md
          ${{ github.event.pull_request.body }}
          EOF
          
          # Check if release exists, if not create it with PR body as notes
          if ! gh release view "v$VERSION" > /dev/null 2>&1; then
            gh release create "v$VERSION" --draft --title "v$VERSION" --notes-file release_notes.md --target main
          else
            echo "Release v$VERSION already exists, updating notes..."
            gh release edit "v$VERSION" --notes-file release_notes.md
          fi
