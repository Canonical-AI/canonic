name: Build arm64 Linux bundle

# Builds aarch64 Linux bundles (.deb + .AppImage) for arm64 Linux devices via
# Tauri. Runs on a native arm64 runner. Trigger manually from the Actions tab.
#
# NOTE: the previous Electron flatpak (org.electronjs.Electron2.BaseApp) path was
# removed in the Tauri migration. A Tauri-native flatpak manifest is a TODO; the
# AppImage produced here is the portable arm64 artifact in the meantime.

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file \
            wget

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Build arm64 Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: canonic-arm64-linux
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
