name: PR Build Validation

on:
  pull_request:
    branches:
      - main
  pull_request_review:
    types: [submitted]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  validate:
    # Run on pull_request events or when a review is submitted and approved
    if: github.event_name == 'pull_request' || (github.event_name == 'pull_request_review' && github.event.review.state == 'approved')
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Dry Run Build
        # We set CSC_IDENTITY_AUTO_DISCOVERY=false to skip signing/notarization during validation
        run: npm run build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
