name: Release

# Build-then-commit: a merged PR computes the next version, builds + tests every
# platform with that version (no publish), and only if ALL builds pass does
# `finalize` commit the version bump, tag, and publish the release. A failed
# build never bumps main or creates a tag. Add the `no-release` label to a PR to
# merge without triggering a build/release at all (CI-only, docs, etc.).
#
# Packaging is Tauri (tauri-apps/tauri-action). Bundles land under
# src-tauri/target/release/bundle/. Tauri reads the version from
# src-tauri/tauri.conf.json + src-tauri/Cargo.toml, so the version is written
# into all three (package.json, conf, Cargo) before building.

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
      mark_critical:
        description: "Mandatory security update (clients can't dismiss the prompt)"
        type: boolean
        default: false
      advisory_url:
        description: "Optional advisory/release link shown on the security banner"
        type: string
        default: ""

# Never run two releases at once — they race on the version bump + tag.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  compute-version:
    # Run on manual dispatch, or on a merged PR that is NOT labeled `no-release`.
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       !contains(github.event.pull_request.labels.*.name, 'no-release'))
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Identify bump type
        id: bump-type
        # Label names are untrusted input — pass via env so they're data, not code.
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_TYPE: ${{ github.event.inputs.bump_type }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "type=$DISPATCH_TYPE" >> "$GITHUB_OUTPUT"
          elif [[ ",$LABELS," == *",major,"* ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ ",$LABELS," == *",minor,"* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next version
        id: compute
        env:
          BUMP_TYPE: ${{ steps.bump-type.outputs.type }}
          PRERELEASE_TAG: ${{ vars.PRERELEASE_TAG }}
        run: |
          # Strip any prerelease suffix before bumping so e.g. 0.0.5-alpha + patch = 0.0.6.
          CURRENT=$(jq -r .version package.json)
          BASE=$(echo "$CURRENT" | sed 's/-.*//')
          if [ "$CURRENT" != "$BASE" ]; then
            npm pkg set version="$BASE"
          fi
          # Compute only — do not tag or commit here.
          npm version "$BUMP_TYPE" --no-git-tag-version >/dev/null
          if [ -n "$PRERELEASE_TAG" ]; then
            NEXT=$(jq -r .version package.json)
            npm pkg set version="${NEXT}-${PRERELEASE_TAG}"
          fi
          VERSION=$(jq -r .version package.json)
          echo "Next version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

  build:
    needs: compute-version
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            artifact: release-mac
            rust-targets: "aarch64-apple-darwin x86_64-apple-darwin"
            args: "--target universal-apple-darwin"
          - platform: windows-latest
            artifact: release-win
            rust-targets: ""
            args: ""
          - platform: ubuntu-24.04
            artifact: release-linux-x64
            rust-targets: ""
            args: ""
          - platform: ubuntu-24.04-arm
            artifact: release-linux-arm64
            rust-targets: ""
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "npm"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          # toolchain input is required when the action is pinned to a SHA (the @ref
          # normally selects the toolchain).
          toolchain: stable
          targets: ${{ matrix.rust-targets }}

      - name: Cache cargo
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: "src-tauri -> target"

      - name: Install Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            file \
            wget \
            xdg-utils

      - name: Install dependencies
        run: npm install

      - name: Set release version
        # Tauri reads the version from tauri.conf.json + Cargo.toml (not package.json),
        # so write it into all three before building.
        shell: bash
        env:
          V: ${{ needs.compute-version.outputs.version }}
        run: |
          npm pkg set version="$V"
          node -e "const fs=require('fs');const v=process.env.V;const f='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(f));c.version=v;fs.writeFileSync(f,JSON.stringify(c,null,2)+'\n');let t=fs.readFileSync('src-tauri/Cargo.toml','utf8');t=t.replace(/^version = \".*\"/m,'version = \"'+v+'\"');fs.writeFileSync('src-tauri/Cargo.toml',t);"

      - name: Run tests
        run: npm test

      - name: Build (Tauri bundle, no publish)
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing. With these set and createUpdaterArtifacts:true in
          # tauri.conf.json, tauri-action emits a signed updater bundle
          # (.app.tar.gz on macOS, the NSIS .exe on Windows, .AppImage on Linux)
          # plus a detached .sig next to each — the inputs for latest.json below.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS signing + notarization. Reuses the existing electron-builder
          # secrets — CSC_LINK is already the base64 of the Developer-ID .p12
          # (identical to what tauri-action wants for APPLE_CERTIFICATE), and
          # CSC_KEY_PASSWORD is its password — so no cert re-export is needed.
          # APPLE_SIGNING_IDENTITY ("Developer ID Application: … (TEAMID)") is the
          # only value electron-builder auto-discovered that tauri needs spelled
          # out. Build is unsigned/ad-hoc if these are absent.
          APPLE_CERTIFICATE: ${{ secrets.CSC_LINK }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            src-tauri/target/**/release/bundle/dmg/*.dmg
            src-tauri/target/**/release/bundle/macos/*.app.tar.gz
            src-tauri/target/**/release/bundle/msi/*.msi
            src-tauri/target/**/release/bundle/nsis/*.exe
            src-tauri/target/**/release/bundle/deb/*.deb
            src-tauri/target/**/release/bundle/appimage/*.AppImage
            src-tauri/target/**/release/bundle/rpm/*.rpm
            src-tauri/target/**/release/bundle/**/*.sig

  build-flatpak:
    # Wrap each arch's .deb (from the `build` job) into a distro-agnostic
    # .flatpak bundle (installs on Alpine, Arch, Fedora, Ubuntu, …). Built
    # NATIVELY per-arch on matching runners: x86_64 on ubuntu-latest, aarch64 on
    # ubuntu-24.04-arm. We do NOT use the `bilelmoussaoui/...:gnome-47` container
    # because it ships no arm64 image (docker pull fails on arm64 runners) —
    # instead flatpak-builder is apt-installed and the GNOME runtime pulled from
    # Flathub, which works identically on both arches. The runtime version below
    # MUST match `runtime-version` in flatpak/ai.canonic.app.yml.
    needs:
      - compute-version
      - build
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: release-linux-x64
            deb_glob: "*_amd64.deb"
            arch: x86_64
          - runner: ubuntu-24.04-arm
            artifact: release-linux-arm64
            deb_glob: "*_arm64.deb"
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Flatpak toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          # GitHub's ubuntu-24.04 images restrict unprivileged user namespaces
          # via AppArmor, which breaks flatpak-builder's bwrap sandbox. Relax it
          # (no-op if the knob doesn't exist on the runner image).
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Install GNOME runtime + SDK (native arch)
        # The manifest builds against org.gnome.{Platform,Sdk}//47. Flathub
        # serves both x86_64 and aarch64, so this resolves to the runner's arch.
        run: |
          flatpak remote-add --if-not-exists --user \
            flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y --noninteractive flathub \
            org.gnome.Platform//47 org.gnome.Sdk//47

      - name: Download Linux build (.deb)
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: linux-deb

      - name: Stage .deb for the manifest
        # The manifest's `path: canonic.deb` is relative to flatpak/, so the
        # built .deb must sit there before flatpak-builder runs.
        env:
          DEB_GLOB: ${{ matrix.deb_glob }}
        run: |
          deb=$(find linux-deb -name "$DEB_GLOB" | head -n1)
          test -n "$deb" || { echo "no .deb matching $DEB_GLOB found in artifact"; exit 1; }
          cp "$deb" flatpak/canonic.deb

      - name: Sync metainfo release version
        # Keep the AppStream <release> in step with the version being shipped.
        env:
          V: ${{ needs.compute-version.outputs.version }}
        run: |
          sed -i "0,/<release version=\"[^\"]*\"/s//<release version=\"$V\"/" \
            flatpak/ai.canonic.app.metainfo.xml

      - name: Build Flatpak bundle
        env:
          BUNDLE: canonic_${{ needs.compute-version.outputs.version }}_${{ matrix.arch }}.flatpak
        run: |
          flatpak-builder --user --force-clean --disable-rofiles-fuse \
            --install-deps-from=flathub \
            --repo=flatpak-repo flatpak-build flatpak/ai.canonic.app.yml
          flatpak build-bundle flatpak-repo "$BUNDLE" ai.canonic.app master

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v7
        with:
          # Unique per arch — same artifact name across matrix legs collides.
          name: release-flatpak-${{ matrix.arch }}
          if-no-files-found: error
          path: canonic_${{ needs.compute-version.outputs.version }}_${{ matrix.arch }}.flatpak

  finalize:
    # Only reached if every build job succeeded. This is the single point that
    # mutates main: commit the bump, tag, and publish — so a failed build leaves
    # main untouched (no bump, no tag, no release).
    needs:
      - compute-version
      - build
      - build-flatpak
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Commit version bump and tag
        # Bump all three version sources so a follow-up build is reproducible.
        env:
          V: ${{ needs.compute-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm pkg set version="$V"
          node -e "const fs=require('fs');const v=process.env.V;const f='src-tauri/tauri.conf.json';const c=JSON.parse(fs.readFileSync(f));c.version=v;fs.writeFileSync(f,JSON.stringify(c,null,2)+'\n');let t=fs.readFileSync('src-tauri/Cargo.toml','utf8');t=t.replace(/^version = \".*\"/m,'version = \"'+v+'\"');fs.writeFileSync('src-tauri/Cargo.toml',t);"
          git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml src-tauri/Cargo.lock 2>/dev/null || git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          git commit -m "chore(release): bump version to $V"
          # Clear any stale tag from a prior failed run.
          git push origin ":refs/tags/v$V" 2>/dev/null || true
          git tag -d "v$V" 2>/dev/null || true
          git tag -a "v$V" -m "v$V"
          git push origin main
          git push origin "refs/tags/v$V"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Write release notes
        # PR body is untrusted (free-form, fork-controllable). Pass via env so the
        # shell treats it as data, never as code — no heredoc/command injection.
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          VERSION: ${{ needs.compute-version.outputs.version }}
        run: |
          if [ -n "$PR_BODY" ]; then
            printf '%s\n' "$PR_BODY" > release_notes.md
          else
            echo "Release v$VERSION" > release_notes.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          gh release create "v$VERSION" \
            --repo Canonical-AI/canonic \
            --title "v$VERSION" \
            --notes-file release_notes.md \
            --target main \
            $(find release-artifacts -type f)

      - name: Generate and upload updater manifest (latest.json)
        # The auto-updater fetches this from the release. It pairs each platform
        # with its signed bundle URL + detached signature (read from the .sig
        # files). VERSION/REPO are passed via env (never interpolated into the
        # script) so untrusted input can't reach the shell or node.
        # MARK_CRITICAL/ADVISORY_URL flag a mandatory security update: from the
        # workflow_dispatch input, or a `security-critical` label on the merged
        # PR. They become unsigned manifest fields the client enforces (the
        # binary is still signature-verified, so this can only force-with-update).
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.compute-version.outputs.version }}
          REPO: Canonical-AI/canonic
          MARK_CRITICAL: ${{ github.event.inputs.mark_critical == 'true' || contains(github.event.pull_request.labels.*.name, 'security-critical') }}
          ADVISORY_URL: ${{ github.event.inputs.advisory_url }}
        run: |
          node <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const version = process.env.VERSION;
          const repo = process.env.REPO;
          const critical = process.env.MARK_CRITICAL === 'true';
          const advisory = process.env.ADVISORY_URL || '';

          // Recursively collect every downloaded artifact file.
          const files = [];
          (function walk(d) {
            for (const e of fs.readdirSync(d, { withFileTypes: true })) {
              const p = path.join(d, e.name);
              if (e.isDirectory()) walk(p);
              else files.push(p);
            }
          })('release-artifacts');

          const base = (p) => path.basename(p);
          const url = (p) => `https://github.com/${repo}/releases/download/v${version}/${base(p)}`;
          const sigFor = (p) => {
            const s = files.find((f) => base(f) === base(p) + '.sig');
            if (!s) throw new Error('missing .sig for ' + base(p));
            return fs.readFileSync(s, 'utf8').trim();
          };

          const platforms = {};
          const add = (key, p) => { platforms[key] = { signature: sigFor(p), url: url(p) }; };

          // macOS universal .app.tar.gz serves both arches.
          const mac = files.find((f) => f.endsWith('.app.tar.gz'));
          if (mac) { add('darwin-aarch64', mac); add('darwin-x86_64', mac); }

          // Windows NSIS installer.
          const win = files.find((f) => /-setup\.exe$/.test(f));
          if (win) add('windows-x86_64', win);

          // Linux AppImages, one per arch.
          for (const a of files.filter((f) => f.endsWith('.AppImage'))) {
            if (/aarch64|arm64/.test(base(a))) add('linux-aarch64', a);
            else add('linux-x86_64', a);
          }

          if (Object.keys(platforms).length === 0) {
            throw new Error('no updater artifacts found — check createUpdaterArtifacts + signing secrets');
          }

          const manifest = {
            version,
            notes: `See https://github.com/${repo}/releases/tag/v${version}`,
            pub_date: new Date().toISOString(),
            platforms,
          };
          // Custom fields the client reads via Update.raw_json to force a
          // mandatory, non-dismissible security update.
          if (critical) {
            manifest.critical = true;
            manifest.severity = 'critical';
            manifest.advisory =
              advisory || `https://github.com/${repo}/releases/tag/v${version}`;
          }

          fs.writeFileSync('latest.json', JSON.stringify(manifest, null, 2));
          console.log(fs.readFileSync('latest.json', 'utf8'));
          EOF
          gh release upload "v$VERSION" latest.json --repo "$REPO" --clobber

  verify-manifest:
    # Post-release smoke test for the auto-updater. The updater is only as good as
    # latest.json, and the manifest step above can silently leave it off the release
    # (e.g. signing produced no .sig). Fetch it the exact way the app does — via the
    # channel URL in tauri.conf.json (releases/latest/download/...), not the tag-
    # pinned asset — and assert it parses, the version matches the tag, and every
    # platform entry carries a signed URL. A red X here means clients can't update.
    needs:
      - compute-version
      - finalize
    runs-on: ubuntu-latest
    steps:
      - name: Verify latest.json is published and well-formed
        env:
          VERSION: ${{ needs.compute-version.outputs.version }}
          REPO: Canonical-AI/canonic
        run: |
          set -euo pipefail
          url="https://github.com/$REPO/releases/latest/download/latest.json"
          echo "Fetching $url"
          # Retry: the `latest` pointer + CDN can lag a few seconds after publish.
          code=000
          for i in 1 2 3 4 5; do
            code=$(curl -sL -o latest.json -w '%{http_code}' "$url" || echo 000)
            [ "$code" = "200" ] && break
            echo "attempt $i: HTTP $code — retrying in 10s"
            sleep 10
          done
          if [ "$code" != "200" ]; then
            echo "::error::latest.json not reachable at channel URL (HTTP $code)"
            cat latest.json || true
            exit 1
          fi
          node <<'EOF'
          const fs = require('fs');
          const want = process.env.VERSION;
          let m;
          try {
            m = JSON.parse(fs.readFileSync('latest.json', 'utf8'));
          } catch (e) {
            console.error('::error::latest.json is not valid JSON: ' + e.message);
            process.exit(1);
          }
          if (m.version !== want) {
            console.error(`::error::latest.json version "${m.version}" != tag "${want}"`);
            process.exit(1);
          }
          const platforms = m.platforms || {};
          const keys = Object.keys(platforms);
          if (keys.length === 0) {
            console.error('::error::latest.json has no platforms');
            process.exit(1);
          }
          for (const k of keys) {
            const p = platforms[k] || {};
            if (!p.url || !p.signature) {
              console.error(`::error::platform "${k}" missing url or signature`);
              process.exit(1);
            }
          }
          console.log(`latest.json OK — v${m.version}, platforms: ${keys.join(', ')}`);
          EOF

  update-brew:
    needs: [compute-version, finalize]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Update Homebrew Cask
        uses: mislav/bump-homebrew-formula-action@ccf2332299a883f6af50a1d2d41e5df7904dd769 # v3
        with:
          formula-name: canonic
          formula-path: Casks/canonic.rb
          homebrew-tap: Canonical-AI/homebrew-tap
          # This workflow runs on a PR-merge (not a tag push), so the action
          # can't infer the tag from the ref — pass it explicitly.
          tag-name: v${{ needs.compute-version.outputs.version }}
          # Universal build (--target universal-apple-darwin) → tauri names the dmg
          # canonic_<version>_universal.dmg (was canonic-arm64.dmg under electron-builder).
          download-url: https://github.com/Canonical-AI/canonic/releases/download/v${{ needs.compute-version.outputs.version }}/canonic_${{ needs.compute-version.outputs.version }}_universal.dmg
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
